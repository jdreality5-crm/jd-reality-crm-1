<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jay Dwarkadhish Real Estate — CRM v6</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#eff6ff;--primary-mid:#bfdbfe;
  --accent:#f59e0b;--accent-light:#fffbeb;
  --success:#10b981;--success-light:#ecfdf5;
  --danger:#ef4444;--danger-light:#fef2f2;
  --warning:#f97316;--warning-light:#fff7ed;
  --purple:#8b5cf6;--purple-light:#f5f3ff;
  --dark:#0f172a;--dark2:#1e293b;--dark3:#334155;
  --gray:#f8fafc;--gray2:#f1f5f9;--gray3:#e2e8f0;--gray4:#cbd5e1;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --white:#ffffff;
  --sidebar-w:260px;
  --radius:14px;--radius-sm:8px;--radius-lg:20px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.06);
  --shadow-md:0 4px 24px rgba(0,0,0,0.10);
  --shadow-lg:0 12px 48px rgba(0,0,0,0.15);
  --transition:all 0.2s cubic-bezier(.4,0,.2,1);
}
body{font-family:'Inter',sans-serif;background:var(--gray);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ===== LOADING ===== */
#loading-screen{position:fixed;inset:0;background:var(--dark);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#loading-screen.hide{display:none;}
.ld-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--primary),#60a5fa);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 40px rgba(37,99,235,0.5);animation:float 2s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.ld-title{color:#fff;font-size:22px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-0.5px;}
.ld-sub{color:rgba(255,255,255,0.4);font-size:13px;}
.ld-bar{width:180px;height:3px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
.ld-bar-inner{height:100%;background:linear-gradient(90deg,var(--primary),#60a5fa);border-radius:4px;animation:ldanim 1.5s ease-in-out infinite;}
@keyframes ldanim{0%{width:0;margin-left:0;}60%{width:70%;margin-left:10%;}100%{width:0;margin-left:100%;};}

/* ===== NOTIFICATION BANNER ===== */
#notif-banner{position:fixed;top:0;left:0;right:0;z-index:9999;display:none;background:linear-gradient(90deg,#ea580c,#f97316);color:#fff;padding:14px 24px;font-size:13px;font-weight:600;align-items:center;gap:12px;box-shadow:0 4px 24px rgba(249,115,22,0.4);}
#notif-banner.open{display:flex;}
.nb-close{margin-left:auto;background:rgba(255,255,255,0.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nb-dot{width:8px;height:8px;border-radius:50%;background:#fff;flex-shrink:0;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.6);}}

/* ===== SYNC ===== */
#sync-indicator{position:fixed;bottom:20px;right:20px;z-index:9000;background:var(--success);color:#fff;border-radius:24px;padding:8px 16px;font-size:12px;font-weight:600;display:none;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(16,185,129,0.3);}
#sync-indicator.show{display:flex;}

/* ===== LOGIN ===== */
#login-screen{display:none;min-height:100vh;}
#login-screen.show{display:flex;}
.login-wrap{display:flex;min-height:100vh;width:100%;}
.login-left{flex:1;background:linear-gradient(145deg,#0f172a 0%,#1e3a5f 55%,#1e40af 100%);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 48px;overflow:hidden;}
.login-left::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,0.2) 0%,transparent 70%);}
.login-left::after{content:'';position:absolute;bottom:-80px;left:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(96,165,250,0.1) 0%,transparent 70%);}
.ll-badge{background:rgba(37,99,235,0.25);border:1px solid rgba(96,165,250,0.3);color:#93c5fd;border-radius:24px;padding:6px 16px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:32px;backdrop-filter:blur(8px);}
.ll-logo{width:180px;margin-bottom:28px;filter:drop-shadow(0 4px 32px rgba(59,130,246,0.4));}
.ll-title{font-size:32px;font-weight:800;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;text-align:center;line-height:1.2;margin-bottom:12px;letter-spacing:-1px;}
.ll-sub{font-size:14px;color:rgba(255,255,255,0.5);text-align:center;line-height:1.8;max-width:300px;}
.ll-address{margin-top:28px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px 20px;font-size:12px;color:rgba(255,255,255,0.5);line-height:2;text-align:center;}
.ll-stats{display:flex;gap:36px;margin-top:36px;}
.ll-stat-val{font-size:26px;font-weight:800;color:#60a5fa;text-align:center;}
.ll-stat-lbl{font-size:10px;color:rgba(255,255,255,0.4);text-align:center;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.login-right{width:440px;background:#fff;display:flex;align-items:center;justify-content:center;padding:60px 48px;}
.lr-inner{width:100%;}
.lr-logo{width:120px;margin-bottom:24px;display:block;}
.lr-title{font-size:26px;font-weight:800;color:var(--dark);font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-0.8px;margin-bottom:4px;}
.lr-sub{font-size:13px;color:var(--text3);margin-bottom:32px;}
.li-group{margin-bottom:16px;}
.li-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:0.3px;}
.li-inp{width:100%;padding:12px 16px;border:1.5px solid var(--gray3);border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:var(--transition);background:#fafbfc;color:var(--text);}
.li-inp:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(37,99,235,0.08);}
.li-err{color:var(--danger);font-size:12px;margin-top:10px;padding:10px 14px;background:var(--danger-light);border-radius:8px;display:none;font-weight:500;}
.li-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:var(--transition);margin-top:4px;letter-spacing:0.3px;}
.li-btn:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,99,235,0.35);}
.li-btn:disabled{background:var(--gray4);transform:none;box-shadow:none;cursor:not-allowed;}
.li-footer{margin-top:28px;padding-top:20px;border-top:1px solid var(--gray3);font-size:11px;color:var(--text3);text-align:center;line-height:1.8;}
.cloud-pill{display:inline-flex;align-items:center;gap:6px;background:var(--success-light);color:var(--success);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;margin-bottom:24px;border:1px solid #a7f3d0;}

/* ===== APP SHELL ===== */
#app{display:none;min-height:100vh;}
#app.show{display:block;}
.layout{display:flex;min-height:100vh;}

/* ===== SIDEBAR ===== */
.sidebar{width:var(--sidebar-w);background:var(--dark);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:300;transition:transform 0.28s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
.sb-head{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.06);}
.sb-brand{display:flex;align-items:center;gap:12px;}
.sb-brand-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),#60a5fa);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sb-brand-name{font-size:14px;font-weight:700;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.2;}
.sb-brand-tag{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;}
.sb-user-area{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06);}
.sb-user{display:flex;align-items:center;gap:11px;cursor:pointer;padding:10px 12px;border-radius:10px;transition:var(--transition);}
.sb-user:hover{background:rgba(255,255,255,0.06);}
.sb-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,0.15);}
.sb-uname{font-size:13px;color:#fff;font-weight:600;line-height:1.2;}
.sb-urole{font-size:11px;color:rgba(255,255,255,0.4);}
.sb-chevron{margin-left:auto;color:rgba(255,255,255,0.25);font-size:12px;}
nav{flex:1;padding:10px 10px;overflow-y:auto;}
.nav-section{font-size:10px;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:1.5px;text-transform:uppercase;padding:14px 12px 6px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;border-radius:10px;transition:var(--transition);margin-bottom:2px;font-weight:500;}
.nav-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);}
.nav-item.active{background:linear-gradient(135deg,rgba(37,99,235,0.35),rgba(37,99,235,0.15));color:#93c5fd;font-weight:700;box-shadow:inset 0 0 0 1px rgba(37,99,235,0.3);}
.nav-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:rgba(255,255,255,0.05);}
.nav-item.active .nav-icon{background:rgba(37,99,235,0.3);}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;}
.sb-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,0.06);}
.logout-btn{width:100%;padding:10px;background:rgba(239,68,68,0.1);color:#fca5a5;border:1px solid rgba(239,68,68,0.2);border-radius:10px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:var(--transition);}
.logout-btn:hover{background:rgba(239,68,68,0.2);color:#fff;}

/* ===== TOPBAR ===== */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{background:#fff;border-bottom:1px solid var(--gray3);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 1px 8px rgba(0,0,0,0.04);}
.tb-left{display:flex;align-items:center;gap:16px;}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;flex-direction:column;gap:5px;}
.hamburger span{display:block;width:20px;height:2px;background:var(--text2);border-radius:2px;}
.tb-title{font-size:18px;font-weight:800;color:var(--dark);font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-0.5px;}
.tb-right{display:flex;align-items:center;gap:12px;}
.tb-date{font-size:12px;color:var(--text3);font-weight:500;background:var(--gray2);padding:5px 12px;border-radius:8px;}
.cloud-badge-top{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;background:var(--success-light);color:var(--success);}
.notif-btn{position:relative;background:var(--gray2);border:none;width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:var(--transition);}
.notif-btn:hover{background:var(--gray3);}
.notif-dot{position:absolute;top:6px;right:6px;background:var(--danger);color:#fff;border-radius:8px;min-width:16px;height:16px;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 4px;}
.notif-dot.show{display:flex;}
.tb-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;border:2px solid var(--gray3);transition:var(--transition);}
.tb-av:hover{border-color:var(--primary);}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:250;backdrop-filter:blur(4px);}
.sb-overlay.open{display:block;}

/* ===== PAGE ===== */
.page-content{padding:24px 28px;flex:1;}
.page-sec{display:none;}
.page-sec.active{display:block;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.ph-title{font-size:22px;font-weight:800;color:var(--dark);font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-0.5px;}
.ph-sub{font-size:13px;color:var(--text3);margin-top:2px;}

/* ===== STATS CARDS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:#fff;border-radius:var(--radius);padding:20px;border:1px solid var(--gray3);box-shadow:var(--shadow);position:relative;overflow:hidden;transition:var(--transition);}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.blue::before{background:linear-gradient(90deg,var(--primary),#60a5fa);}
.stat-card.green::before{background:linear-gradient(90deg,var(--success),#34d399);}
.stat-card.red::before{background:linear-gradient(90deg,var(--danger),#f87171);}
.stat-card.orange::before{background:linear-gradient(90deg,var(--warning),#fb923c);}
.stat-card.purple::before{background:linear-gradient(90deg,var(--purple),#a78bfa);}
.stat-card.amber::before{background:linear-gradient(90deg,var(--accent),#fbbf24);}
.sc-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px;}
.stat-card.blue .sc-icon{background:var(--primary-light);}
.stat-card.green .sc-icon{background:var(--success-light);}
.stat-card.red .sc-icon{background:var(--danger-light);}
.stat-card.orange .sc-icon{background:var(--warning-light);}
.stat-card.purple .sc-icon{background:var(--purple-light);}
.stat-card.amber .sc-icon{background:var(--accent-light);}
.sc-val{font-size:30px;font-weight:800;color:var(--dark);line-height:1;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-1px;}
.sc-lbl{font-size:12px;color:var(--text3);margin-top:6px;font-weight:500;}
.sc-trend{font-size:11px;font-weight:600;margin-top:8px;}
.sc-trend.up{color:var(--success);}
.sc-trend.dn{color:var(--danger);}

/* ===== TABLE ===== */
.table-wrap{background:#fff;border-radius:var(--radius);border:1px solid var(--gray3);overflow:hidden;box-shadow:var(--shadow);}
.table-toolbar{padding:16px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--gray3);background:#fafbfc;}
.search-box{position:relative;display:flex;align-items:center;}
.search-box input{padding:9px 13px 9px 36px;border:1.5px solid var(--gray3);border-radius:10px;font-size:13px;width:220px;outline:none;font-family:'Inter',sans-serif;transition:var(--transition);background:#fff;}
.search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(37,99,235,0.08);}
.search-icon{position:absolute;left:11px;color:var(--text3);font-size:14px;pointer-events:none;}
.filter-sel{padding:9px 12px;border:1.5px solid var(--gray3);border-radius:10px;font-size:13px;outline:none;background:#fff;color:var(--text);font-family:'Inter',sans-serif;cursor:pointer;transition:var(--transition);}
.filter-sel:focus{border-color:var(--primary);}
.btn{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;border:none;font-family:'Inter',sans-serif;transition:var(--transition);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,0.3);}
.btn-success{background:var(--success);color:#fff;}
.btn-success:hover{background:#059669;}
.btn-outline{background:#fff;color:var(--primary);border:1.5px solid var(--primary);}
.btn-outline:hover{background:var(--primary-light);}
.btn-ghost{background:var(--gray2);color:var(--text2);}
.btn-ghost:hover{background:var(--gray3);}
.btn-wa{background:#25D366;color:#fff;}
.btn-wa:hover{background:#128C7E;}
.btn-sm{padding:6px 12px;font-size:12px;}
.lead-count{padding:10px 20px;font-size:12px;font-weight:600;color:var(--text2);background:var(--gray2);border-bottom:1px solid var(--gray3);}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--dark);color:rgba(255,255,255,0.8);padding:11px 16px;text-align:left;font-size:11px;font-weight:600;white-space:nowrap;letter-spacing:0.5px;text-transform:uppercase;}
thead th:first-child{border-radius:0;}
tbody tr{border-bottom:1px solid var(--gray3);transition:var(--transition);}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#f8fafc;}
tbody td{padding:11px 16px;font-size:13px;vertical-align:middle;}
.lead-name{color:var(--primary);cursor:pointer;font-weight:700;font-size:14px;}
.lead-name:hover{text-decoration:underline;}

/* ===== TAGS ===== */
.src-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.3px;}
.src-mb{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa;}
.src-99{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
.src-jd{background:var(--primary-light);color:var(--primary);border:1px solid var(--primary-mid);}
.src-ref{background:var(--success-light);color:#059669;border:1px solid #a7f3d0;}
.src-walk{background:var(--purple-light);color:#7c3aed;border:1px solid #ddd6fe;}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.status-pill::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.s-new{background:#eff6ff;color:#1d4ed8;}.s-new::before{background:#2563eb;}
.s-active{background:#ecfdf5;color:#065f46;}.s-active::before{background:#10b981;}
.s-site-visit,.s-site{background:#fffbeb;color:#92400e;}.s-site-visit::before,.s-site::before{background:#f59e0b;}
.s-negotiation,.s-nego{background:#f5f3ff;color:#5b21b6;}.s-negotiation::before,.s-nego::before{background:#8b5cf6;}
.s-closed{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;}.s-closed::before{background:#10b981;}
.s-lost{background:#fef2f2;color:#991b1b;}.s-lost::before{background:#ef4444;}
.icon-action{background:none;border:none;cursor:pointer;padding:5px 7px;border-radius:7px;font-size:15px;transition:var(--transition);}
.icon-action:hover{background:var(--gray2);}

/* ===== MODAL ===== */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:600;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:var(--radius-lg);width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--gray3);position:sticky;top:0;background:#fff;z-index:10;border-radius:var(--radius-lg) var(--radius-lg) 0 0;}
.mh-left{display:flex;align-items:center;gap:12px;}
.mh-icon{width:38px;height:38px;border-radius:10px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:17px;}
.modal-hdr h3{font-size:16px;font-weight:700;color:var(--dark);font-family:'Plus Jakarta Sans',sans-serif;}
.modal-hdr p{font-size:12px;color:var(--text3);margin-top:1px;}
.modal-close{background:var(--gray2);border:none;color:var(--text2);font-size:16px;cursor:pointer;width:32px;height:32px;border-radius:8px;display:
